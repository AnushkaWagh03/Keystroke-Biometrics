experiment_name: cmu_identification_experiment

dataset:
  name: cmu

model:
  name: placeholder_model
  parameters:
    threshold: 0.5

evaluation:
  verification:
    enabled: true
    metrics: ["EER", "ROC_AUC", "ANGA"] # Demonstrate metric selection
    n_thresholds: 100
  identification:
    enabled: true
    rank_n_values: [1, 3, 5, 10, 20]
  performance:
    enabled: true # Authentication time metrics
  visualization:
    plot_roc: true
    plot_rank_n: true
    plot_auth_times: true
    plot_verification_bars: true
    save_individual_plots: true

